apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: test-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/sadokkhessairi/k3s-infra
    targetRevision: HEAD
    path: manifests/app-manifests          # exact path inside your infra repo

  destination:
    server: https://kubernetes.default.svc
    namespace: app        # matches your namespace.yaml

  syncPolicy:
    automated:
      prune: true                     # removes resources deleted from git
      selfHeal: true                  # re-applies if someone manually changes something in the cluster
    syncOptions:
      - CreateNamespace=true          # creates machine-monitor namespace if it doesn't exist
