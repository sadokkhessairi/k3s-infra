apiVersion: v1
kind: ConfigMap
metadata:
  name: zot-config
  namespace: registry
data:
  config.json: |
    {
      "distSpecVersion": "1.1.0",
      "storage": {
        "rootDirectory": "/var/lib/registry",
        "dedupe": true,
        "gc": true,
        "gcDelay": "1h",
        "gcInterval": "24h"
      },
      "http": {
        "address": "0.0.0.0",
        "port": "5000",
        "realm": "zot",
        "auth": {
          "htpasswd": {
            "path": "/etc/zot/htpasswd"
          }
        },
        "accessControl": {
          "repositories": {
            "**": {
              "policies": [
                {
                  "users": ["admin"],
                  "actions": ["read", "create", "update", "delete"]
                }
              ],
              "defaultPolicy": ["read"]
            }
          }
        }
      },
      "log": {
        "level": "info",
        "output": "/dev/stdout"
      }
    }
