apiVersion: apps/v1
kind: Deployment
metadata:
  name: zot
  namespace: registry
  labels:
    app: zot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zot
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: zot
    spec:
      containers:
      - name: zot
        image: ghcr.io/project-zot/zot:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 5000
          name: http
          protocol: TCP
        env:
        - name: ZOT_LOG_LEVEL
          value: "info"
        volumeMounts:
        - name: config
          mountPath: /etc/zot/config.json
          subPath: config.json
          readOnly: true
        - name: auth
          mountPath: /etc/zot/htpasswd
          subPath: htpasswd
          readOnly: true
        - name: data
          mountPath: /var/lib/registry
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          tcpSocket:
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          tcpSocket:
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: config
        configMap:
          name: zot-config
          items:
          - key: config.json
            path: config.json
      - name: auth
        secret:
          secretName: zot-auth
      - name: data
        persistentVolumeClaim:
          claimName: zot-storage
