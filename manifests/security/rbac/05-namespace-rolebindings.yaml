# ============================================
# Bind Grafana to its Role
# ============================================
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grafana-config-reader-binding
  namespace: monitoring
subjects:
  - kind: ServiceAccount
    name: grafana
    namespace: monitoring
roleRef:
  kind: Role
  name: grafana-config-reader
  apiGroup: rbac.authorization.k8s.io

