# ============================================
# Bind vmagent to its ClusterRole
# ============================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vmagent-scraper-binding
subjects:
  - kind: ServiceAccount
    name: vmagent
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: vmagent-scraper
  apiGroup: rbac.authorization.k8s.io

---
# ============================================
# Bind Promtail to its ClusterRole
# ============================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail-reader-binding
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: promtail-reader
  apiGroup: rbac.authorization.k8s.io

---
# ============================================
# Bind kube-state-metrics to its ClusterRole
# ============================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kube-state-metrics-binding
subjects:
  - kind: ServiceAccount
    name: kube-state-metrics
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: kube-state-metrics-reader
  apiGroup: rbac.authorization.k8s.io

---
# ============================================
# Bind Sealed Secrets Controller to its ClusterRole
# ============================================
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: sealed-secrets-controller
  labels:
    app.kubernetes.io/name: sealed-secrets
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: sealed-secrets-controller
subjects:
  - kind: ServiceAccount
    name: sealed-secrets-controller
    namespace: security
