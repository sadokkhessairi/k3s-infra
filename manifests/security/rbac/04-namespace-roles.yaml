---
# ============================================
# Role for Sealed Secrets Key Management
# Purpose: Read/write encryption keys in security namespace
# Why Role (not ClusterRole): Keys only stored in security namespace
# ============================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sealed-secrets-key-admin
  namespace: security
  labels:
    app.kubernetes.io/name: sealed-secrets
rules:
  # Full access to secrets (for encryption keys)
  - apiGroups:
      - ""
    resources:
      - secrets
    verbs:
      - get
      - list
      - create
      - update
      - delete
      - watch
  
  # Read service accounts
  - apiGroups:
      - ""
    resources:
      - serviceaccounts
    verbs:
      - get
  
  # Create service account tokens
  - apiGroups:
      - ""
    resources:
      - serviceaccounts/token
    verbs:
      - create
