# ============================================
# Role for Grafana (monitoring namespace only)
# Purpose: Read ConfigMaps for dashboard provisioning
# Why Role (not ClusterRole): Only needs monitoring namespace
# ============================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: grafana-config-reader
  namespace: monitoring
rules:
  - apiGroups: [""]
    resources:
      - configmaps
      - secrets
    verbs: ["get", "list", "watch"]

---
# ============================================
# Role for Loki (monitoring namespace only)
# Purpose: Minimal permissions for operation
# ============================================
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: loki-reader
  namespace: monitoring
rules:
  - apiGroups: [""]
    resources:
      - pods
      - services
    verbs: ["get", "list"]

