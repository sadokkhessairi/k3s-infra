apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-monitoring-internal
  namespace: monitoring
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  
  ingress:
  # Allow all pods in monitoring namespace to receive traffic from each other
  - from:
    - podSelector: {}
  
  egress:
  # Allow all pods in monitoring namespace to send traffic to each other
  - to:
    - podSelector: {}
