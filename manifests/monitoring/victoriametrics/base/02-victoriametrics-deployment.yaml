apiVersion: apps/v1
kind: Deployment
metadata:
  name: victoria-metrics
  namespace: monitoring
  labels:
    app: victoria-metrics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: victoria-metrics
  template:
    metadata:
      labels:
        app: victoria-metrics
    spec:
      containers:
      - name: victoria-metrics
        image: victoriametrics/victoria-metrics:v1.97.1
        args:
          - -storageDataPath=/storage
          - -retentionPeriod=14d
          - -httpListenAddr=0.0.0.0:8428
          - -selfScrapeInterval=10s
        ports:
        - containerPort: 8428
          name: http
          protocol: TCP
        volumeMounts:
        - name: storage
          mountPath: /storage
        resources:
          requests:
            memory: 200Mi
            cpu: 100m
          limits:
            memory: 500Mi
            cpu: 1000m
        livenessProbe:
          httpGet:
            path: /health
            port: 8428
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8428
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
      volumes:
      - name: storage
        persistentVolumeClaim:
          claimName: victoria-metrics-data
