apiVersion: apps/v1
kind: Deployment
metadata:
  name: vmalert
  namespace: monitoring
  labels:
    app: vmalert
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vmalert
  template:
    metadata:
      labels:
        app: vmalert
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8880"
    spec:
      containers:
      - name: vmalert
        image: victoriametrics/vmalert:v1.97.1
        args:
          - -datasource.url=http://victoria-metrics:8428
          - -notifier.url=http://alertmanager:9093
          - -rule=/etc/vmalert/alerts.yaml
          - -evaluationInterval=30s
          - -httpListenAddr=:8880
          - -external.url=http://vmalert:8880
          - -remoteWrite.url=http://victoria-metrics:8428
        ports:
        - containerPort: 8880
          name: http
        volumeMounts:
        - name: rules
          mountPath: /etc/vmalert
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
      volumes:
      - name: rules
        configMap:
          name: vmalert-rules
