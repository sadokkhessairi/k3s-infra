apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
    - name: VictoriaMetrics
      type: prometheus
      access: proxy
      url: http://victoria-metrics:8428
      isDefault: true
      editable: true
      jsonData:
        timeInterval: 30s
    - name: Loki
      type: loki
      access: proxy
      url: http://loki:3100
