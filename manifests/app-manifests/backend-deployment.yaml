apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: app
spec:
  revisionHistoryLimit: 3
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      nodeSelector:
        node-role.kubernetes.io/worker: worker
      containers:
        - name: backend
          image: ghcr.io/sadokkhessairi/test-app/backend:v3.0
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: sqlite-data
              mountPath: /data
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: sqlite-data
          persistentVolumeClaim:
            claimName: backend-sqlite-pvc
      imagePullSecrets:
        - name: ghcr-creds
